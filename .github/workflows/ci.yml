name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features

  fmt:
    name: Format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets --all-features

  linux-check:
    # Non-blocking smoke check that the platform-independent library
    # modules (editor, stacker, config, lsp, terminal model, error log,
    # etc.) still cross-compile on Linux. The GUI binary depends on
    # gpui's macos-blade backend and the macOS-only Metal effects stack,
    # so we deliberately scope this to `cargo check --lib
    # --no-default-features` — that skips every gpui-gated module
    # without trying to link the workspace binary. Promote to a required
    # check once it has been consistently green.
    name: Linux Check (lib, no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `rfd` pulls in gtk-sys / glib-sys via its build scripts even
      # when the calling code is feature-gated out, and `notify` uses
      # inotify (already in the kernel headers shipped with ubuntu).
      # Install GTK 3 dev headers so the rfd build scripts find
      # pkg-config metadata; everything else is already present on
      # `ubuntu-latest`.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev
      - run: cargo check --lib --no-default-features

  build-release:
    name: Build Release Bundle
    runs-on: macos-latest
    needs: [check, fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: ./bundle.sh --release
      - uses: actions/upload-artifact@v4
        with:
          name: llnzy-macos
          path: |
            target/release/llnzy
            target/llnzy.app
